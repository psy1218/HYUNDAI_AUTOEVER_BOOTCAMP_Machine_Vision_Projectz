<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실내 AR 길안내 시스템</title>
</head>
<body>
  <h1>실내 AR 길안내 시스템</h1>

  <label for="destinationSelect">목적지 선택</label>
  <select id="destinationSelect">
    <option value="">-- 목적지를 선택하세요 --</option>
  </select>

  <button id="showBtn">보기</button>

  <div id="selectedInfo" style="margin-top: 20px;"></div>

  <button id="startBtn" style="display:none; margin-top: 10px;">안내 시작</button>

  <br><br>

  <video id="video" autoplay playsinline width="320" height="240" style="display:none; border:1px solid #ccc;"></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="result" style="margin-top:20px;">결과 표시</div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
